name: test_MIRNetv2-MixUpsample-{SEED}
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 42

datasets:
  test:
    name: MixUpsample_test
    type: Dataset_PairedImage
    dataroot_gt: ../data/MixUpsample_Dataset_R2A2_256/test/H
    dataroot_lq: ../data/MixUpsample_Dataset_R2A2_256/test/L
    io_backend:
      type: disk
    pair_by_index: true

network_g:
  type: MIRNet_v2
  inp_channels: 3
  out_channels: 3
  n_feat: 96
  chan_factor: 1.5
  n_RRG: 4
  n_MRB: 2
  height: 3
  width: 2
  scale: 1
  bias: false

path:
  pretrain_network_g: ../experiments/MIRNetv2-MixUpsample-Controlled-{SEED}/models/net_g_latest.pth
  strict_load_g: true

val:
  save_img: false
  rgb2bgr: true
  use_image: false
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

name: MIRNetv2-MixUpsample-windows
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 42

datasets:
  train:
    name: MixUpsample_train
    type: Dataset_PairedImage
    dataroot_gt: ../data/MixUpsample_Dataset_R2A2_256/train/H
    dataroot_lq: ../data/MixUpsample_Dataset_R2A2_256/train/L
    io_backend:
      type: disk
    pair_by_index: true
    geometric_augs: true
    gt_size: 256
    use_shuffle: true
    num_worker_per_gpu: 0
    batch_size_per_gpu: 1      # 3050Ti 4GB：bs=2 易 OOM，降到 1（结构不变，参数仅 ~5.5M）
    mini_batch_sizes: [1]       # 与 batch_size_per_gpu 保持一致，避免加载 2 张再丢弃
    iters: [120000]
    gt_sizes: [256]
    dataset_enlarge_ratio: 1
    prefetch_mode: ~
  val:
    name: MixUpsample_test
    type: Dataset_PairedImage
    dataroot_gt: ../data/MixUpsample_Dataset_R2A2_256/test/H
    dataroot_lq: ../data/MixUpsample_Dataset_R2A2_256/test/L
    io_backend:
      type: disk
    pair_by_index: true

network_g:
  type: MIRNet_v2
  inp_channels: 3
  out_channels: 3
  n_feat: 80
  chan_factor: 1.5
  n_RRG: 4
  n_MRB: 2
  height: 3
  width: 2
  scale: 1
  bias: false

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 60000
  warmup_iter: -1
  use_grad_clip: true
  grad_clip_max_norm: 1.0      # 放宽裁剪阈值（默认 0.01 过小会裁死梯度、丧失自我修正能力），bs=1 下更需放宽
  amp_dtype: bfloat16          # BF16（Ampere 3050Ti，动态范围等同 FP32，无 GradScaler）
  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [60000]
    restart_weights: [1]
    eta_mins: [!!float 1e-7]
  mixing_augs:
    mixup: false
  optim_g:
    type: AdamW
    lr: !!float 2e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

val:
  val_freq: !!float 1e3
  save_img: false
  rgb2bgr: true
  use_image: false
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 200
  save_checkpoint_freq: !!float 2e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500

name: KBNet_l-MixUpsample
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 42

datasets:
  train:
    name: MixUpsample_train
    type: Dataset_PairedImage
    dataroot_gt: ../data/MixUpsample_Dataset_R2A2_256/train/H
    dataroot_lq: ../data/MixUpsample_Dataset_R2A2_256/train/L
    io_backend:
      type: disk
    pair_by_index: true
    geometric_augs: true
    gt_size: 256
    use_shuffle: true
    num_worker_per_gpu: 4          # 适配 4090 主机多核 CPU
    batch_size_per_gpu: 3          # 4090 24GB：KBNet_l 激活大，batch 4 会 OOM，取 3
    mini_batch_sizes: [3]          # 单阶段，须与 batch 保持一致
    iters: [66667]                 # 须等于 total_iter（渐进阶段边界）
    gt_sizes: [256]
    dataset_enlarge_ratio: 1
    prefetch_mode: ~
  val:
    name: MixUpsample_test
    type: Dataset_PairedImage
    dataroot_gt: ../data/MixUpsample_Dataset_R2A2_256/test/H
    dataroot_lq: ../data/MixUpsample_Dataset_R2A2_256/test/L
    io_backend:
      type: disk
    pair_by_index: true

network_g:
  type: KBNet_l
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4, 6, 6, 8]
  num_refinement_blocks: 4
  heads: [1, 2, 4, 8]
  ffn_expansion_factor: 1.5
  bias: false
  blockname: KBBlock_l

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 66667           # 200000样本÷batch3，保持数据集遍历=42.5 epoch
  warmup_iter: -1
  use_grad_clip: true
  amp_dtype: bfloat16         # 4090(Ada) 原生支持 BF16，无 GradScaler 溢出风险
  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [66667]          # 须等于 total_iter
    restart_weights: [1]
    eta_mins: [!!float 1e-7]
  mixing_augs:
    mixup: false
  optim_g:
    type: AdamW
    lr: !!float 2.45e-4          # sqrt 缩放：2e-4 × √(3/2)（batch 2→3）
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

val:
  val_freq: !!float 650       # ~保持约100次验证
  save_img: false
  rgb2bgr: true
  use_image: false
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 130
  save_checkpoint_freq: !!float 1300    # 保持约50次存档
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500

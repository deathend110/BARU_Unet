name: KBNet_s-MixUpsample-Controlled-S43
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 44

datasets:
  train:
    name: MixUpsample_train
    type: Dataset_PairedImage
    dataroot_gt: ../data/MixUpsample_Dataset_R2A2_256/train/H
    dataroot_lq: ../data/MixUpsample_Dataset_R2A2_256/train/L
    io_backend:
      type: disk
    pair_by_index: true
    geometric_augs: true
    gt_size: 256
    use_shuffle: true
    num_worker_per_gpu: 8          # 适配 4090 主机多核 CPU
    batch_size_per_gpu: 6
    mini_batch_sizes: [6]         # 单阶段，须与 batch 保持一致
    iters: [33340]                # batch 6，共曝光 200040 个样本
    gt_sizes: [256]
    dataset_enlarge_ratio: 1
    prefetch_mode: ~
  val:
    name: MixUpsample_test
    type: Dataset_PairedImage
    dataroot_gt: ../data/MixUpsample_Dataset_R2A2_256/test/H
    dataroot_lq: ../data/MixUpsample_Dataset_R2A2_256/test/L
    io_backend:
      type: disk
    pair_by_index: true

network_g:
  type: KBNet_s
  img_channel: 3
  width: 16
  middle_blk_num: 12
  enc_blk_nums: [2, 2, 4, 8]
  dec_blk_nums: [2, 2, 2, 2]
  lightweight: true
  ffn_scale: 1.5

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 33340           # 与其余模型对齐约 20 万样本曝光
  warmup_iter: 667            # 总训练进度的约 2%
  use_grad_clip: true
  amp_dtype: bfloat16         # 受控基准统一使用 BF16
  grad_clip_max_norm: 1.0     # 五个模型统一梯度裁剪阈值
  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [33340]          # 须等于 total_iter
    restart_weights: [1]
    eta_mins: [!!float 1e-7]
  mixing_augs:
    mixup: false
  optim_g:
    type: AdamW
    lr: !!float 3.5e-4        # sqrt 缩放：2e-4 × √3（batch 2→6）
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

val:
  val_freq: !!float 1667      # 每 5% 训练进度验证一次，共 20 次
  save_img: false
  rgb2bgr: true
  use_image: false
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 40
  save_checkpoint_freq: !!float 1667    # 与验证频率同步
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500

name: KBNet_s-MixUpsample
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 42

datasets:
  train:
    name: MixUpsample_train
    type: Dataset_PairedImage
    dataroot_gt: ../data/MixUpsample_Dataset_R2A2_256/train/H
    dataroot_lq: ../data/MixUpsample_Dataset_R2A2_256/train/L
    io_backend:
      type: disk
    pair_by_index: true
    geometric_augs: true
    gt_size: 256
    use_shuffle: true
    num_worker_per_gpu: 8          # 适配 4090 主机多核 CPU
    batch_size_per_gpu: 16         # 4090 24GB：batch 2→16（8×，轻量 CNN）
    mini_batch_sizes: [16]         # 单阶段，与 batch 保持一致
    iters: [7500]                  # total_iter÷8，保持 epoch=25.5
    gt_sizes: [256]
    dataset_enlarge_ratio: 1
    prefetch_mode: ~
  val:
    name: MixUpsample_test
    type: Dataset_PairedImage
    dataroot_gt: ../data/MixUpsample_Dataset_R2A2_256/test/H
    dataroot_lq: ../data/MixUpsample_Dataset_R2A2_256/test/L
    io_backend:
      type: disk
    pair_by_index: true

network_g:
  type: KBNet_s
  img_channel: 3
  width: 64
  middle_blk_num: 12
  enc_blk_nums: [2, 2, 4, 8]
  dec_blk_nums: [2, 2, 2, 2]

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 7500            # batch 8× → 迭代数÷8，保持数据集遍历次数不变
  warmup_iter: -1
  use_grad_clip: true
  amp_dtype: bfloat16         # 4090(Ada) 原生支持 BF16，无 GradScaler 溢出风险
  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [7500]           # 须等于 total_iter
    restart_weights: [1]
    eta_mins: [!!float 1e-7]
  mixing_augs:
    mixup: false
  optim_g:
    type: AdamW
    lr: !!float 5.66e-4         # sqrt 缩放：2e-4 × √8（batch 2→16）
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

val:
  val_freq: !!float 125       # 随 total_iter÷8 缩放，保持验证节奏
  save_img: false
  rgb2bgr: true
  use_image: false
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 25
  save_checkpoint_freq: !!float 250     # 随 total_iter÷8 缩放，保持存档节奏
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500

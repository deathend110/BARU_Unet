name: SCUNet-MixUpsample-Controlled-S44-4090
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 44

datasets:
  train:
    name: MixUpsample_train
    type: Dataset_PairedImage
    dataroot_gt: ../data/MixUpsample_Dataset_R2A2_256/train/H
    dataroot_lq: ../data/MixUpsample_Dataset_R2A2_256/train/L
    io_backend:
      type: disk
    pair_by_index: true
    geometric_augs: true
    gt_size: 256
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 12
    mini_batch_sizes: [12]
    iters: [16660]
    gt_sizes: [256]
    dataset_enlarge_ratio: 1
    prefetch_mode: ~
  val:
    name: MixUpsample_test
    type: Dataset_PairedImage
    dataroot_gt: ../data/MixUpsample_Dataset_R2A2_256/test/H
    dataroot_lq: ../data/MixUpsample_Dataset_R2A2_256/test/L
    io_backend:
      type: disk
    pair_by_index: true

network_g:
  type: SCUNet
  in_nc: 3
  config: [3, 3, 3, 3, 3, 3, 3]
  dim: 64

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 16660
  warmup_iter: 333
  use_grad_clip: true
  amp_dtype: bfloat16         # 受控基准统一使用 BF16
  grad_clip_max_norm: 1.0     # 五个模型统一梯度裁剪阈值
  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [16660]
    restart_weights: [1]
    eta_mins: [!!float 1e-7]
  mixing_augs:
    mixup: false
  optim_g:
    type: AdamW
    lr: !!float 4.90e-4         # 由 batch 2 按平方根规则缩放到 batch 12
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

val:
  val_freq: !!float 833
  save_img: false
  rgb2bgr: true
  use_image: false
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 33
  save_checkpoint_freq: !!float 833
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500
